services:
  # ═══════════════════════════════════════
  # Redis — 进度缓存
  # ═══════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: mailgraph-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass mailgraph2024
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    restart: unless-stopped
    networks:
      - mailgraph

  # ═══════════════════════════════════════
  # MySQL — RAGFlow 元数据存储
  # ═══════════════════════════════════════
  mysql:
    image: mysql:8.0
    container_name: mailgraph-mysql
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=mailgraph2024
      - MYSQL_DATABASE=mailgraph
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    volumes:
      - ./data/mysql:/var/lib/mysql
    restart: unless-stopped
    networks:
      - mailgraph

  # ═══════════════════════════════════════
  # MinIO — RAGFlow 文件存储
  # ═══════════════════════════════════════
  minio:
    image: minio/minio:latest
    container_name: mailgraph-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=mailgraph2024
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    restart: unless-stopped
    networks:
      - mailgraph

  # ═══════════════════════════════════════
  # Elasticsearch — RAGFlow 内部文档检索引擎
  # ═══════════════════════════════════════
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: mailgraph-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - ./data/es:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - mailgraph

  # ═══════════════════════════════════════
  # RAGFlow — GraphRAG 知识图谱引擎
  # ═══════════════════════════════════════
  ragflow:
    image: infiniflow/ragflow:latest
    container_name: mailgraph-ragflow
    ports:
      - "9380:80"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=mailgraph2024
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=mailgraph2024
      - ES_HOST=elasticsearch
      - ES_PORT=9200
      - API_PROXY_SCHEME=python
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - MINIO_USER=admin
      - MINIO_PASSWORD=mailgraph2024
    volumes:
      - ./data/ragflow:/data
    depends_on:
      - mysql
      - redis
      - elasticsearch
      - minio
    restart: unless-stopped
    networks:
      - mailgraph

networks:
  mailgraph:
    driver: bridge
