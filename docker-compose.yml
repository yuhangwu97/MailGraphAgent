services:
  # ═══════════════════════════════════════
  # Redis — 邮件管线状态 & 正文暂存
  # ═══════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: mailgraph-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass mailgraph2024
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    restart: unless-stopped
    networks:
      - mailgraph
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "mailgraph2024", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ═══════════════════════════════════════
  # etcd — Milvus 元数据
  # ═══════════════════════════════════════
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: mailgraph-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./data/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    restart: unless-stopped
    networks:
      - mailgraph
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ═══════════════════════════════════════
  # MinIO — Milvus 对象存储
  # ═══════════════════════════════════════
  minio:
    image: minio/minio:latest
    container_name: mailgraph-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=mailgraph2024
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    restart: unless-stopped
    networks:
      - mailgraph
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ═══════════════════════════════════════
  # Milvus — LightRAG 向量存储
  # ═══════════════════════════════════════
  milvus:
    image: milvusdb/milvus:v2.5.4
    container_name: mailgraph-milvus
    command: milvus run standalone
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
      - MINIO_ACCESS_KEY_ID=admin
      - MINIO_SECRET_ACCESS_KEY=mailgraph2024
    ports:
      - "19530:19530"
    volumes:
      - ./data/milvus:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - mailgraph
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:9091/healthz')\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ═══════════════════════════════════════
  # Neo4j — LightRAG 图谱存储
  # ═══════════════════════════════════════
  neo4j:
    image: neo4j:5.26-community
    container_name: mailgraph-neo4j
    environment:
      - NEO4J_AUTH=neo4j/mailgraph2024
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./data/neo4j:/data
    restart: unless-stopped
    networks:
      - mailgraph
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ═══════════════════════════════════════
  # 后端 API（FastAPI）— REST + SSE + 查询；重活入队给 worker，不做解析
  # ═══════════════════════════════════════
  api:
    build: .
    container_name: mailgraph-api
    command: uvicorn src.backend.app:app --host 0.0.0.0 --port 8000
    env_file: .env
    # environment 覆盖 .env 里的 localhost 主机名为 compose 服务名
    environment: &app_env
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: mailgraph2024
      REDIS_URI: redis://:mailgraph2024@redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: mailgraph2024
      MILVUS_URI: http://milvus:19530
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      redis: { condition: service_started }
      neo4j: { condition: service_started }
      milvus: { condition: service_started }
    restart: unless-stopped
    networks:
      - mailgraph

  # ═══════════════════════════════════════
  # Worker — DeepDoc 解析 + LightRAG 建图（CPU 密集，与 API 隔离）
  # ═══════════════════════════════════════
  worker:
    build: .
    container_name: mailgraph-worker
    command: python -m src.backend.worker
    env_file: .env
    environment:
      <<: *app_env
    volumes:
      - ./data:/app/data
      - ./data/hf_cache:/root/.cache/huggingface   # DeepDoc 运行时首拉的 HF 模型缓存，持久化复用
    depends_on:
      redis: { condition: service_started }
      neo4j: { condition: service_started }
      milvus: { condition: service_started }
    restart: unless-stopped
    networks:
      - mailgraph

  # ═══════════════════════════════════════
  # Web — nginx 托管 Vue 静态包 + 反代 /api → api:8000
  # ═══════════════════════════════════════
  web:
    build: ./src/web
    container_name: mailgraph-web
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - mailgraph

networks:
  mailgraph:
    driver: bridge
