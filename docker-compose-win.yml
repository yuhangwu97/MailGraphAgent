# MailGraphAgent — 基础设施（Docker）
# API / Worker / 前端 在 Windows 上直接运行，不在 Docker 中。
#
# 启动：  docker compose up -d
# 停止：  docker compose down
# 清数据：docker compose down -v && rmdir /s data\redis data\etcd data\minio data\milvus data\neo4j

services:
  # ═══════════════════════════════════════
  # Redis — 邮件管线状态 & 正文暂存
  # ═══════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: mailgraph-redis
    command: redis-server --appendonly yes --requirepass mailgraph2024
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "mailgraph2024", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ═══════════════════════════════════════
  # etcd — Milvus 元数据
  # ═══════════════════════════════════════
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: mailgraph-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./data/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ═══════════════════════════════════════
  # MinIO — Milvus 对象存储
  # ═══════════════════════════════════════
  minio:
    image: minio/minio:latest
    container_name: mailgraph-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=mailgraph2024
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ═══════════════════════════════════════
  # Milvus — LightRAG 向量存储
  # ═══════════════════════════════════════
  milvus:
    image: milvusdb/milvus:v2.5.4
    container_name: mailgraph-milvus
    command: milvus run standalone
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
      - MINIO_ACCESS_KEY_ID=admin
      - MINIO_SECRET_ACCESS_KEY=mailgraph2024
    ports:
      - "19530:19530"
    volumes:
      - ./data/milvus:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ═══════════════════════════════════════
  # Neo4j — LightRAG 图谱存储
  # ═══════════════════════════════════════
  neo4j:
    image: neo4j:5.26-community
    container_name: mailgraph-neo4j
    environment:
      - NEO4J_AUTH=neo4j/mailgraph2024
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./data/neo4j:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
