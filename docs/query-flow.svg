<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">MailGraphAgent query flow</title>
  <desc id="desc">Readable query routing flow for MailGraphAgent.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 12; }
      .stat { stroke: #0f766e; }
      .content { stroke: #7c3aed; }
      .hybrid { stroke: #d97706; }
      .answer { stroke: #2563eb; fill: #eff6ff; }
      .title { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="430"/>
  <text class="title" x="48" y="48">查询怎么走</text>

  <rect class="box" x="70" y="105" width="180" height="78"/>
  <text class="label" x="109" y="136">用户问题</text>
  <text class="small" x="98" y="160">自然语言输入</text>

  <rect class="box" x="315" y="105" width="190" height="78"/>
  <text class="label" x="362" y="136">查询规划</text>
  <text class="small" x="340" y="160">判断 stat / content / hybrid</text>

  <rect class="box stat" x="610" y="50" width="220" height="82"/>
  <text class="label" x="675" y="82">统计查询</text>
  <text class="small" x="641" y="106">Redis 索引直接计算</text>

  <rect class="box content" x="610" y="170" width="220" height="82"/>
  <text class="label" x="675" y="202">内容查询</text>
  <text class="small" x="632" y="226">LightRAG + Neo4j + Milvus</text>

  <rect class="box hybrid" x="610" y="290" width="220" height="82"/>
  <text class="label" x="675" y="322">混合查询</text>
  <text class="small" x="629" y="346">主题证据 ∩ Redis 过滤</text>

  <rect class="box answer" x="930" y="165" width="190" height="92"/>
  <text class="label" x="977" y="198">最终结果</text>
  <text class="small" x="965" y="224">答案、表格、证据</text>
  <text class="small" x="982" y="244">trace</text>

  <path class="arrow" d="M250 144 L307 144"/>
  <path class="arrow" d="M505 144 C545 144, 555 91, 602 91"/>
  <path class="arrow" d="M505 144 C545 144, 555 211, 602 211"/>
  <path class="arrow" d="M505 144 C545 144, 555 331, 602 331"/>
  <path class="arrow" d="M830 91 C885 91, 890 195, 922 205"/>
  <path class="arrow" d="M830 211 L922 211"/>
  <path class="arrow" d="M830 331 C885 331, 890 228, 922 218"/>
</svg>
