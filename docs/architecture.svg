<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">MailGraphAgent architecture</title>
  <desc id="desc">Readable architecture diagram for MailGraphAgent.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; rx: 14; }
      .box { fill: #ffffff; stroke-width: 1.4; rx: 12; }
      .source { stroke: #2563eb; }
      .process { stroke: #059669; }
      .knowledge { stroke: #7c3aed; }
      .query { stroke: #dc2626; }
      .store { stroke: #475569; fill: #f1f5f9; }
      .title { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .lane-title { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .label { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .tiny { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .soft-arrow { stroke: #94a3b8; stroke-width: 1.8; fill: none; marker-end: url(#arrow); stroke-dasharray: 5 5; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="560"/>
  <text class="title" x="48" y="48">MailGraphAgent 架构总览</text>
  <text class="small" x="48" y="74">把企业邮件变成可查询、可追溯、可展示的知识图谱</text>

  <rect class="lane" x="40" y="105" width="1120" height="210"/>
  <text class="lane-title" x="64" y="132">主数据链路</text>

  <rect class="box source" x="70" y="165" width="180" height="92"/>
  <text class="label" x="105" y="198">邮件来源</text>
  <text class="small" x="94" y="224">IMAP 邮箱</text>
  <text class="small" x="94" y="244">EML / MSG / PST / OST</text>

  <rect class="box process" x="300" y="165" width="190" height="92"/>
  <text class="label" x="348" y="198">处理管线</text>
  <text class="small" x="326" y="224">解析正文、附件、元数据</text>
  <text class="small" x="326" y="244">清洗噪音、进入队列</text>

  <rect class="box knowledge" x="540" y="165" width="190" height="92"/>
  <text class="label" x="590" y="198">知识构建</text>
  <text class="small" x="573" y="224">LightRAG 增量抽取</text>
  <text class="small" x="570" y="244">实体、关系、向量</text>

  <rect class="box query" x="780" y="165" width="170" height="92"/>
  <text class="label" x="820" y="198">智能查询</text>
  <text class="small" x="812" y="224">统计 / 问答 / 混合</text>
  <text class="small" x="811" y="244">答案 + 证据 trace</text>

  <rect class="box source" x="1000" y="165" width="120" height="92"/>
  <text class="label" x="1033" y="198">前端</text>
  <text class="small" x="1028" y="224">工作台</text>
  <text class="small" x="1019" y="244">图谱 / 聊天</text>

  <path class="arrow" d="M250 211 L292 211"/>
  <path class="arrow" d="M490 211 L532 211"/>
  <path class="arrow" d="M730 211 L772 211"/>
  <path class="arrow" d="M950 211 L992 211"/>

  <rect class="lane" x="40" y="350" width="1120" height="150"/>
  <text class="lane-title" x="64" y="377">存储与基础设施</text>

  <rect class="box store" x="86" y="405" width="190" height="62"/>
  <text class="label" x="148" y="429">Redis</text>
  <text class="tiny" x="112" y="451">状态、队列、统计索引</text>

  <rect class="box store" x="340" y="405" width="190" height="62"/>
  <text class="label" x="403" y="429">Neo4j</text>
  <text class="tiny" x="376" y="451">实体关系图谱</text>

  <rect class="box store" x="594" y="405" width="190" height="62"/>
  <text class="label" x="657" y="429">Milvus</text>
  <text class="tiny" x="638" y="451">语义向量索引</text>

  <rect class="box store" x="848" y="405" width="190" height="62"/>
  <text class="label" x="901" y="429">本地 KV</text>
  <text class="tiny" x="875" y="451">chunk、实体、关系缓存</text>

  <path class="soft-arrow" d="M395 257 C395 330, 180 330, 180 397"/>
  <path class="soft-arrow" d="M635 257 C635 330, 435 330, 435 397"/>
  <path class="soft-arrow" d="M635 257 C635 330, 690 330, 690 397"/>
  <path class="soft-arrow" d="M635 257 C635 330, 944 330, 944 397"/>
</svg>
